<!-- CTP26 Launch Page — 貼到 Page Settings → Custom Code → Inside <head> tag -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1c2b; --cream:#fffdf6; --grid:#f3e9cd;
    --yellow:#f7c948; --gold:#f0b429;
    --blue:#5b79e3; --blue-lt:#a9bdf0;
    --teal:#3ec6a8; --mint:#8fe3c9;
    --orange:#f5a65b; --pink:#f2b8c6; --muted:#6b6b7b;
  }
  body{
    font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);
    background-color:var(--cream);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
    margin:0;
  }
  .ctp-main{
    min-height:88vh;
    display:flex; align-items:center; justify-content:center;
    padding:48px 20px 40px;
  }
  .ctp-card{width:100%; max-width:920px; text-align:center;}
  .ctp-kv{
    display:block; width:100%; height:auto;
    border:4px solid var(--ink);
    box-shadow:10px 10px 0 var(--yellow);
    background:#fff;
  }
  .ctp-badge{
    display:inline-flex; align-items:center; gap:10px;
    margin:44px auto 20px; padding:10px 22px;
    background:var(--ink); color:#fff;
    font-weight:700; font-size:15px;
    letter-spacing:.22em; text-indent:.22em;
    box-shadow:5px 5px 0 var(--blue-lt);
  }
  .ctp-badge .px{width:10px;height:10px;background:var(--yellow);animation:ctpblink 1.2s steps(2,start) infinite;}
  @keyframes ctpblink{to{visibility:hidden}}
  .ctp-h1{
    font-size:clamp(30px,5.4vw,48px);
    font-weight:900; line-height:1.25; letter-spacing:.06em; margin:0;
  }
  .ctp-en-title{
    margin:10px 0 0;
    font-size:clamp(15px,2.4vw,20px);
    font-weight:700; color:var(--blue); letter-spacing:.08em;
  }
  .ctp-divider{display:flex; justify-content:center; gap:6px; margin:30px 0;}
  .ctp-divider span{width:12px;height:12px}
  .ctp-divider span:nth-child(1){background:var(--yellow)}
  .ctp-divider span:nth-child(2){background:var(--teal)}
  .ctp-divider span:nth-child(3){background:var(--blue)}
  .ctp-divider span:nth-child(4){background:var(--orange)}
  .ctp-divider span:nth-child(5){background:var(--pink)}
  .ctp-copy{
    max-width:640px; margin:0 auto;
    font-size:clamp(16px,2.6vw,18px); line-height:2; font-weight:500;
  }
  .ctp-copy strong{
    font-weight:900;
    background:linear-gradient(transparent 62%, var(--yellow) 62%);
    padding:0 2px;
  }
  .ctp-copy-en{
    max-width:600px; margin:22px auto 0;
    font-size:clamp(13.5px,2.2vw,15.5px); line-height:1.9; color:var(--muted);
  }
  .ctp-dots::after{content:"";animation:ctpdots 1.8s steps(4,end) infinite;}
  @keyframes ctpdots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}}
  .ctp-footer{
    padding:26px 20px 34px; text-align:center;
    font-size:13.5px; color:var(--muted); line-height:1.9;
  }
  .ctp-footer .org{font-weight:700; color:var(--ink); font-size:14.5px; margin:0;}
  .ctp-footer p{margin:0;}
  .ctp-sprite{
    position:fixed; width:14px; height:14px; opacity:.85;
    animation:ctpfloat 5.2s ease-in-out infinite; pointer-events:none;
  }
  .ctp-sprite.s1{top:12%;left:7%;background:var(--teal)}
  .ctp-sprite.s2{top:24%;right:9%;background:var(--yellow);animation-delay:1.1s}
  .ctp-sprite.s3{bottom:20%;left:11%;background:var(--pink);animation-delay:2.2s}
  .ctp-sprite.s4{bottom:14%;right:13%;background:var(--blue);animation-delay:.6s}
  .ctp-sprite.s5{top:52%;left:4%;background:var(--orange);animation-delay:1.7s}
  .ctp-sprite.s6{top:58%;right:5%;background:var(--mint);animation-delay:2.8s}
  @keyframes ctpfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @media (max-width:560px){
    .ctp-kv{box-shadow:6px 6px 0 var(--yellow)}
    .ctp-sprite{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    .ctp-sprite,.ctp-badge .px,.ctp-dots::after{animation:none}
  }
</style>
